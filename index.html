<script>
        const CONFIG = {
            SHEET_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTsVYjgGweLhqF6FX2aiz5H7YCcLlkbi1fFYF4UmF13JAaXW1kwT5Ael47Rb2icfnPvQPsNzQ82ab6O/pub?gid=0&single=true&output=csv",
            BRANCH: {
                lat: 37.495085, 
                lng: 127.035252
            }
        };

        let map;
        let markers = [];
        let allData = [];
        let currentCategory = '전체'; 
        let refLat = null;
        let refLng = null;
        let selectedTargetId = null;
        let isInitialLoad = true; 

        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOption = { 
                center: new naver.maps.LatLng(CONFIG.BRANCH.lat, CONFIG.BRANCH.lng), 
                zoom: 16 
            };
            map = new naver.maps.Map(mapContainer, mapOption);
        }

        function getDistance(lat1, lng1, lat2, lng2) {
            if (!lat1 || !lng1 || !lat2 || !lng2) return 999999;
            const dy = parseFloat(lat1) - parseFloat(lat2);
            const dx = parseFloat(lng1) - parseFloat(lng2);
            return Math.sqrt(dx * dx + dy * dy);
        }

        function parseCSV(text) {
            const rows = []; let row = []; let insideQuote = false; let entries = '';
            for (let i = 0; i < text.length; i++) {
                let char = text[i]; let nextChar = text[i+1];
                if (char === '"') {
                    if (insideQuote && nextChar === '"') { entries += '"'; i++; }
                    else { insideQuote = !insideQuote; }
                } else if (char === ',' && !insideQuote) {
                    row.push(entries.trim().replace(/\r/g, '')); entries = '';
                } else if ((char === '\n' || char === '\r') && !insideQuote) {
                    if (char === '\r' && nextChar === '\n') { i++; }
                    row.push(entries.trim().replace(/\r/g, ''));
                    if (row.length > 1 || row[0] !== '') rows.push(row);
                    row = []; entries = '';
                } else { entries += char; }
            }
            if (entries || row.length > 0) { row.push(entries.trim().replace(/\r/g, '')); rows.push(row); }
            const headers = rows[0];
            return rows.slice(1).map((r, index) => {
                let obj = {}; headers.forEach((h, i) => { obj[h] = r[i] || ''; });
                obj.uid = 'place_' + index; return obj;
            });
        }

        async function fetchSheetData() {
            try {
                const response = await fetch(CONFIG.SHEET_CSV_URL);
                const csvText = await response.text();
                const data = parseCSV(csvText);
                
                // 🟢 [가장 안전한 방식] 복잡한 연산 없이 시트에 적힌 '위도', '경도' 숫자를 바로 핀으로 꽂습니다!
                allData = data.filter(item => item['노출'] && item['노출'].trim().toUpperCase() === 'TRUE').map(item => {
                    item.computedLat = parseFloat(item['위도'] || 0);
                    item.computedLng = parseFloat(item['경도'] || 0);
                    
                    let naverUrl = item['네이버맵URL'] || '';
                    item.rawMapUrl = (naverUrl && naverUrl.startsWith('http')) ? naverUrl : 'https://map.naver.com';
                    return item;
                });

                renderMapAndList();
            } catch (error) { 
                console.error('데이터 오류:', error); 
            }
        }

        function renderMapAndList(shouldScrollToTarget = false) {
            markers.forEach(marker => marker.setMap(null));
            markers = [];
            const listContainer = document.getElementById('restaurant-list');
            listContainer.innerHTML = '';

            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            let listFiltered = currentCategory === '전체' ? allData : allData.filter(item => item['카테고리'] && item['카테고리'].includes(currentCategory));

            if (keyword) {
                listFiltered = listFiltered.filter(item => {
                    const name = (item['이름'] || '').toLowerCase();
                    const desc = (item['한줄평'] || '').toLowerCase();
                    const tag = (item['태그'] || '').toLowerCase();
                    return name.includes(keyword) || desc.includes(keyword) || tag.includes(keyword);
                });
            }

            if (refLat && refLng) {
                listFiltered.sort((a, b) => {
                    const distA = getDistance(refLat, refLng, a.computedLat, a.computedLng);
                    const distB = getDistance(refLat, refLng, b.computedLat, b.computedLng);
                    return distA - distB;
                });
            } else {
                listFiltered.sort((a, b) => {
                    const aIsSP = (a['카테고리'] || '').includes('스파크플러스');
                    const bIsSP = (b['카테고리'] || '').includes('스파크플러스');
                    if (aIsSP && !bIsSP) return -1;
                    if (!aIsSP && bIsSP) return 1;
                    const nameA = a['이름'] || ''; const nameB = b['이름'] || '';
                    return nameA.localeCompare(nameB, 'ko');
                });
            }

            let mapFiltered = allData.filter(item => {
                let cate = item['카테고리'] || '';
                return currentCategory === '전체' || cate.includes(currentCategory) || cate.includes('스파크플러스');
            });

            if (keyword) {
                mapFiltered = mapFiltered.filter(item => {
                    if ((item['카테고리'] || '').includes('스파크플러스')) return true;
                    const name = (item['이름'] || '').toLowerCase();
                    const desc = (item['한줄평'] || '').toLowerCase();
                    const tag = (item['태그'] || '').toLowerCase();
                    return name.includes(keyword) || desc.includes(keyword) || tag.includes(keyword);
                });
            }

            mapFiltered.forEach(item => {
                let cate = item['카테고리'] || ''; let pinClass = "pin-양식"; 
                if(cate.includes('한식')) pinClass = 'pin-한식';
                else if(cate.includes('카페')) pinClass = 'pin-카페';
                else if(cate.includes('일식')) pinClass = 'pin-일식';
                else if(cate.includes('중식')) pinClass = 'pin-중식';
                else if(cate.includes('양식')) pinClass = 'pin-양식';
                else if(cate.includes('아시안')) pinClass = 'pin-아시안';
                else if(cate.includes('도시락')) pinClass = 'pin-도시락';
                else if(cate.includes('술집')) pinClass = 'pin-술집';
                else if(cate.includes('스파크플러스')) pinClass = 'pin-스파크플러스';

                // 좌표가 0이 아닐 때만 핀을 렌더링합니다.
                if (item.computedLat && item.computedLng && item.computedLat !== 0) {
                    const markerContent = `<div class="custom-pin ${pinClass}">${item['이모지'] || ''} ${item['이름'] || ''}</div>`;
                    
                    const marker = new naver.maps.Marker({
                        position: new naver.maps.LatLng(item.computedLat, item.computedLng),
                        map: map,
                        icon: {
                            content: markerContent,
                            anchor: new naver.maps.Point(50, 32) 
                        }
                    });

                    naver.maps.Event.addListener(marker, 'click', function() {
                        refLat = item.computedLat; refLng = item.computedLng; selectedTargetId = item.uid; 
                        map.panTo(new naver.maps.LatLng(item.computedLat, item.computedLng));

                        if (cate.includes('스파크플러스')) {
                            currentCategory = '전체';
                            document.querySelectorAll('.filter-btn').forEach(b => {
                                if (b.dataset.category === '전체') b.classList.add('active');
                                else b.classList.remove('active');
                            });
                        }
                        renderMapAndList(true);
                    });
                    markers.push(marker);
                }
            });

            if (listFiltered.length === 0) {
                listContainer.innerHTML = '<p style="text-align:center; color:#888; padding:30px; font-size:14px;">🔍 검색 결과에 맞는 맛집이 없습니다.</p>';
            } else {
                listFiltered.forEach(item => {
                    let cate = item['카테고리'] || ''; let card = document.createElement('div');
                    card.className = 'card'; card.id = item.uid; 
                    if (selectedTargetId === item.uid) card.classList.add('active-target');

                    let inquiryBtnHtml = cate.includes('스파크플러스') ? `<button class="inquiry-btn">✉️ 문의하기</button>` : '';

                    card.innerHTML = `
                        <div class="card-header"><h3 class="card-title">${item['이모지'] || ''} ${item['이름'] || ''}</h3></div>
                        <p class="card-desc">${item['한줄평'] ? `"${item['한줄평']}"` : ''}</p>
                        <div class="card-footer">
                            ${item['카테고리'] ? `<span class="tag">${item['카테고리']}</span>` : ''}
                            ${item['가격대'] ? `<span class="tag">${item['가격대']}</span>` : ''}
                            ${item['태그'] ? `<span class="tag">${item['태그']}</span>` : ''}
                        </div>
                        <div class="btn-group">${inquiryBtnHtml}<button class="map-link-btn" data-url="${item.rawMapUrl}">🗺️ 상세위치</button></div>
                    `;

                    card.addEventListener('click', () => {
                        if (item.computedLat && item.computedLat !== 0) {
                            map.panTo(new naver.maps.LatLng(item.computedLat, item.computedLng)); 
                            refLat = item.computedLat; refLng = item.computedLng; selectedTargetId = item.uid;
                        }

                        if (cate.includes('스파크플러스')) {
                            currentCategory = '전체';
                            document.querySelectorAll('.filter-btn').forEach(b => {
                                if (b.dataset.category === '전체') b.classList.add('active');
                                else b.classList.remove('active');
                            });
                        }
                        renderMapAndList(false); 
                    });

                    card.querySelector('.map-link-btn').addEventListener('click', (e) => {
                        e.stopPropagation(); window.open(e.target.getAttribute('data-url'), '_blank'); 
                    });

                    const inqBtn = card.querySelector('.inquiry-btn');
                    if (inqBtn) { inqBtn.addEventListener('click', (e) => { e.stopPropagation(); window.open('https://www.sparkplus.co/office', '_blank'); }); }

                    listContainer.appendChild(card);
                });
            }

            if (shouldScrollToTarget && selectedTargetId) {
                setTimeout(() => {
                    const targetCard = document.getElementById(selectedTargetId);
                    if (targetCard) targetCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);
            }

            if (isInitialLoad || (!refLat && currentCategory === '전체')) {
                setTimeout(() => {
                    if (map) {
                        map.setCenter(new naver.maps.LatLng(CONFIG.BRANCH.lat, CONFIG.BRANCH.lng));
                    }
                }, 100);
                isInitialLoad = false; 
            }
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category; 
                refLat = null; refLng = null; selectedTargetId = null; 
                
                if (currentCategory === '전체' && map) {
                    map.setCenter(new naver.maps.LatLng(CONFIG.BRANCH.lat, CONFIG.BRANCH.lng));
                }
                renderMapAndList();
            });
        });

        document.getElementById('search-input').addEventListener('input', () => {
            refLat = null; refLng = null; selectedTargetId = null; renderMapAndList();
        });

        // 네이버 전용 구동식 가동
        initMap();
        fetchSheetData();
    </script>
